.corner-tr{position:absolute;top:-1px;right:-1px;width:8px;height:8px;border-top:2px solid;border-right:2px solid}
.corner-bl{position:absolute;bottom:-1px;left:-1px;width:8px;height:8px;border-bottom:2px solid;border-left:2px solid}

<div id="pixel-rain-container"></div>
<script>
(function(){const c=document.getElementById('pixel-rain-container')||document.createElement('div');
if(!c.id){c.id='pixel-rain-container';document.body.appendChild(c);}
for(let i=0;i<15;i++){const p=document.createElement('div');p.className='pixel-rain';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.background=['#7b5ea7','#d96496','#55e84c','#e8c94c'][Math.floor(Math.random()*4)];c.appendChild(p);}})();

// Floating particles
if(!window._particles){
  window._particles=true;
  function spawnParticle(){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.top='-10px';
    p.style.width=(1+Math.random()*2)+'px';
    p.style.height=p.style.width;
    p.style.opacity=String(0.35+Math.random()*0.25);
    p.style.background=Math.random()>0.5?'#d96496':'#7b5ea7';
    p.style.animation='particleFall '+(8+Math.random()*12)+'s linear forwards';
    p.style.filter='blur('+(Math.random()>0.7?'1px':'0')+')'
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
    setTimeout(spawnParticle,1500+Math.random()*3000);
  }
  setTimeout(spawnParticle,2000);
}
</script>

function saveData(){
  const raw={e:S.events,s:S.stickers};
  try{localStorage.setItem('saiki-pwa-v1',JSON.stringify(raw));}catch(e){}
  const uid=getUserId();
  db.collection('diaries').doc(uid).set(raw,{merge:true}).catch(e=>console.error('sync err',e));
}
function loadData(cb){
  // Load local cache first
  try{const d=JSON.parse(localStorage.getItem('saiki-pwa-v1'));if(d){S.events=d.e||{};S.stickers=d.s||{};}}catch(e){}
  // Then sync from cloud
  const uid=getUserId();
  db.collection('diaries').doc(uid).get().then(doc=>{
    if(doc.exists){
      const d=doc.data();
      S.events=d.e||{};S.stickers=d.s||{};
      try{localStorage.setItem('saiki-pwa-v1',JSON.stringify(d));}catch(e){}
    }
    if(cb)cb();
  }).catch(()=>{if(cb)cb();});
}

// Bottom-fixed cat zone (outside #app scroll)
if(!document.getElementById('nekoFixed')){
const nf=document.createElement('div');
nf.id='nekoFixed';
Object.assign(nf.style,{position:'fixed',bottom:'12px',left:'0',right:'0',height:'50px',zIndex:'50',pointerEvents:'none',overflow:'visible'});
const ni=document.createElement('img');
ni.id='neko';
ni.src=CS.sit;
Object.assign(ni.style,{position:'absolute',bottom:'0',height:'48px',width:'64px',imageRendering:'pixelated',cursor:'pointer',pointerEvents:'auto',filter:'drop-shadow(0 0 6px #d9649680) drop-shadow(0 0 12px #b0447330)'});
nf.appendChild(ni);
document.body.appendChild(nf);
}

const NEKOSAY=[
'メビウス5mm🚬','絶対的ヒーロー✨','#サイキ通信ケーブル📟','悪・即・斬🗡️',
'(=^・ω・^=)','(ↀᴥↀ)','ฅ^•ﻌ•^ฅ','喋り屋与太郎🏮','残機残り9匹🐈‍⬛',
'#サイキアクト3📢','仲磨ｱ−👾!','#さいきニブンノイチ💟','俺と握手🤝','21歳+∞'
];

if(!window._nekoF){
window._nekoF=true;
let nx=Math.floor(window.innerWidth*0.3),dir=1,st='idle',timer=0,fr=0,walkLen=0,bubT=-1;
const SPD=0.5;
function pick(a){return a[Math.floor(Math.random()*a.length)];}

function showBubble(){
  const old=document.getElementById('nekoBubble');
  if(old)old.remove();
  const zone=document.getElementById('nekoFixed');
  if(!zone)return;
  const b=document.createElement('div');
  b.id='nekoBubble';
  // Pixel speech bubble structure
  const txt=document.createElement('span');
  txt.textContent=pick(NEKOSAY);
  Object.assign(b.style,{
    position:'absolute',bottom:'54px',
    background:'#0a0a12',color:'#d96496',
    fontFamily:"'Press Start 2P',monospace",fontSize:'8px',
    padding:'5px 8px',
    whiteSpace:'nowrap',pointerEvents:'none',
    animation:'popIn 0.2s ease',zIndex:'60',
    border:'2px solid #7b5ea7',
    boxShadow:'3px 3px 0 rgba(80,60,100,0.4),0 0 10px #d9649630',
    textShadow:'0 0 6px #d9649650',
    lineHeight:'1.4',imageRendering:'pixelated'
  });
  // Pixel tail triangle
  const tail=document.createElement('div');
  Object.assign(tail.style,{
    position:'absolute',bottom:'-7px',left:'12px',
    width:'0',height:'0',
    borderLeft:'6px solid transparent',
    borderRight:'6px solid transparent',
    borderTop:'7px solid #7b5ea7'
  });
  const tailInner=document.createElement('div');
  Object.assign(tailInner.style,{
    position:'absolute',bottom:'-5px',left:'13px',
    width:'0',height:'0',
    borderLeft:'5px solid transparent',
    borderRight:'5px solid transparent',
    borderTop:'6px solid #0a0a12'
  });
  // Corner accents
  const cTL=document.createElement('div');
  Object.assign(cTL.style,{position:'absolute',top:'-1px',left:'-1px',width:'4px',height:'4px',borderTop:'2px solid #d96496',borderLeft:'2px solid #d96496'});
  const cTR=document.createElement('div');
  Object.assign(cTR.style,{position:'absolute',top:'-1px',right:'-1px',width:'4px',height:'4px',borderTop:'2px solid #d96496',borderRight:'2px solid #d96496'});
  b.appendChild(txt);
  b.appendChild(tail);
  b.appendChild(tailInner);
  b.appendChild(cTL);
  b.appendChild(cTR);
  zone.appendChild(b);
  bubT=150;
}

function updBub(){
  const b=document.getElementById('nekoBubble');
  if(!b)return;
  b.style.left=(nx+8)+'px';
  if(bubT>0)bubT--;
  else if(bubT===0){b.remove();bubT=-1;}
}

document.addEventListener('click',function(e){
  const el=document.getElementById('neko');
  if(!el)return;
  const r=el.getBoundingClientRect();
  if(e.clientX>=r.left-15&&e.clientX<=r.right+15&&e.clientY>=r.top-15&&e.clientY<=r.bottom+15){
    showBubble();
    st='react';timer=0;fr=0;
    const maxX=window.innerWidth-64;
    if(nx>maxX/2)dir=-1;else dir=1;
    if(Math.random()<0.3)dir*=-1;
    walkLen=60+Math.random()*80;
  }
});

function nekoTick(){
  const el=document.getElementById('neko');
  if(!el){requestAnimationFrame(nekoTick);return;}
  const maxX=window.innerWidth-64;
  timer++;fr++;

  const flip=dir>0?'scaleX(-1)':'scaleX(1)';

  if(st==='idle'){
    if(timer===1){el.src=pick([CS.sit,CS.loaf,CS.loaf]);el.style.transform=flip;}
    if(timer===150){el.src=pick([CS.sit,CS.loaf]);}
    if(timer===100&&Math.random()<0.15){showBubble();}
    el.style.transform=flip;
    if(timer%300===150&&Math.random()<0.4){showBubble();}
    if(timer>220+Math.random()*200){
      if(Math.random()<0.6){st='walk';timer=0;walkLen=80+Math.random()*120;}
      else{st='idle';timer=0;}
    }
  }
  else if(st==='walk'){
    nx+=SPD*dir;
    el.src=Math.floor(fr/12)%2===0?CS.w1:CS.w2;
    el.style.transform=flip;
    if(timer>walkLen){st='idle';timer=0;if(Math.random()<0.3)dir*=-1;}
    if(nx>=maxX){nx=maxX;dir=-1;}
    if(nx<=0){nx=0;dir=1;}
  }
  else if(st==='react'){
    if(timer<25){el.src=CS.sit;el.style.transform=flip;}
    else{
      nx+=SPD*1.2*dir;
      el.src=Math.floor(fr/10)%2===0?CS.w1:CS.w2;
      el.style.transform=flip;
      if(nx>=maxX){nx=maxX;dir=-1;}
      if(nx<=0){nx=0;dir=1;}
      if(timer>25+walkLen){st='idle';timer=0;}
    }
  }

  el.style.left=nx+'px';
  updBub();
  requestAnimationFrame(nekoTick);
}
requestAnimationFrame(nekoTick);

// Score count-up animation
function animateScore(){
  const scoreEl=document.getElementById('scoreVal');
  const hiEl=document.getElementById('hiVal');
  if(!scoreEl||!hiEl)return;
  const targetS=parseInt(scoreEl.dataset.target)||0;
  const targetH=parseInt(hiEl.dataset.target)||0;
  let cur=0,step=Math.max(1,Math.floor(Math.max(targetS,targetH)/20));
  let done=false;
  function tick(){
    cur+=step;
    if(cur>=Math.max(targetS,targetH)){cur=Math.max(targetS,targetH);done=true;}
    scoreEl.textContent='SCORE '+String(Math.min(cur,targetS)).padStart(8,'0');
    hiEl.textContent='HI-SCORE '+String(Math.min(cur,targetH)).padStart(8,'0');
    if(!done){requestAnimationFrame(tick);}
    else{
      // Flash twice
      let fc=0;
      const fi=setInterval(()=>{
        fc++;
        scoreEl.style.opacity=fc%2===0?'1':'.3';
        hiEl.style.opacity=fc%2===0?'1':'.3';
        if(fc>=4){clearInterval(fi);scoreEl.style.opacity='1';hiEl.style.opacity='1';}
      },150);
    }
  }
  scoreEl.textContent='SCORE 00000000';
  hiEl.textContent='HI-SCORE 00000000';
  requestAnimationFrame(tick);
}

// Stats bar count-up animation
function animateStats(){
  const bars=document.querySelectorAll('[data-stat-target]');
  bars.forEach(bar=>{
    const target=parseFloat(bar.dataset.statTarget)||0;
    bar.style.width='0%';
    bar.style.transition='width 0.8s cubic-bezier(0.22,1,0.36,1)';
    setTimeout(()=>{bar.style.width=target+'%';},50);
  });
  const nums=document.querySelectorAll('[data-num-target]');
  nums.forEach(numEl=>{
    const target=parseInt(numEl.dataset.numTarget)||0;
    let cur=0;const step=Math.max(1,Math.floor(target/15));
    function t(){
      cur=Math.min(cur+step,target);
      numEl.textContent=cur;
      if(cur<target)requestAnimationFrame(t);
    }
    numEl.textContent='0';
    requestAnimationFrame(t);
  });
  // Percentage ring animation
  const ring=document.getElementById('statRing');
  if(ring){
    const targetDeg=parseFloat(ring.dataset.deg)||0;
    let curDeg=0;
    function ringTick(){
      curDeg+=targetDeg/25;
      if(curDeg>=targetDeg)curDeg=targetDeg;
      ring.style.background=`conic-gradient(#d96496 ${curDeg}deg,#7b5ea715 0deg)`;
      if(curDeg<targetDeg)requestAnimationFrame(ringTick);
    }
    requestAnimationFrame(ringTick);
  }
}
